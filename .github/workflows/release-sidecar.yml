name: Release Sidecar

on:
  push:
    tags:
      - "sidecar-v*"

permissions:
  contents: read

jobs:
  build-cpu-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r sidecar/requirements.txt

      - name: Download LGPL ffmpeg
        run: python sidecar/fetch_ffmpeg.py

      - name: Build CPU sidecar
        run: python sidecar/build.py --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-windows
          path: |
            sidecar/dist/transcribe-cpu-*.zip

  build-cpu-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r sidecar/requirements.txt

      - name: Download LGPL ffmpeg
        run: python sidecar/fetch_ffmpeg.py

      - name: Build CPU sidecar
        run: python sidecar/build.py --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-macos
          path: |
            sidecar/dist/transcribe-cpu-*.zip

  build-cuda-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CUDA-flavored PyTorch and sidecar deps
        run: |
          python -m pip install --upgrade pip
          pip install -r sidecar/requirements-cuda.txt

      - name: Verify torch is the CUDA build
        shell: pwsh
        run: |
          python -c "import torch; print('torch:', torch.__version__); print('cuda build:', torch.version.cuda)"
          python -c "import torch, sys; sys.exit(0 if torch.version.cuda else 1)"

      - name: Download LGPL ffmpeg
        run: python sidecar/fetch_ffmpeg.py

      - name: Build CUDA sidecar
        run: python sidecar/build.py --release --cuda --skip-cuda-check

      - name: Split if over 2GB
        shell: pwsh
        run: |
          $threshold = 2000000000
          $partSize  = 1900000000
          $zip = Get-ChildItem sidecar/dist/transcribe-cuda-*.zip | Select-Object -First 1
          if (-not $zip) { throw "No CUDA zip produced" }
          if ($zip.Length -le $threshold) {
            Write-Host "Zip is under 2GB, no splitting needed: $($zip.Length) bytes"
            exit 0
          }
          Write-Host "Splitting $($zip.Name) ($($zip.Length) bytes) into ~1.9 GB parts"
          $stream = [System.IO.File]::OpenRead($zip.FullName)
          try {
            $partNum = 1
            $buffer  = New-Object byte[] $partSize
            while ($true) {
              $read = $stream.Read($buffer, 0, $buffer.Length)
              if ($read -le 0) { break }
              $partPath = "$($zip.FullName).part$partNum"
              $fs = [System.IO.File]::OpenWrite($partPath)
              try { $fs.Write($buffer, 0, $read) } finally { $fs.Close() }
              Write-Host "  wrote $partPath ($read bytes)"
              $partNum++
            }
          } finally {
            $stream.Close()
          }
          Remove-Item $zip.FullName
          Get-ChildItem sidecar/dist/transcribe-cuda-* | Format-Table Name, Length

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-cuda-windows
          path: |
            sidecar/dist/transcribe-cuda-*
          if-no-files-found: error

  release:
    needs: [build-cpu-windows, build-cpu-macos, build-cuda-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: sidecar/dist/
          merge-multiple: true

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#sidecar-v}" >> "$GITHUB_OUTPUT"

      - name: Generate manifest
        run: python sidecar/make_manifest.py --version ${{ steps.version.outputs.version }} --dir sidecar/dist

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Transcription Engine ${{ steps.version.outputs.version }}"
          body: |
            CPU variants for Windows x64 and macOS arm64, plus CUDA variant
            for Windows x64. All variants built reproducibly in CI.
          draft: true
          files: |
            sidecar/dist/transcribe-cpu-*.zip
            sidecar/dist/transcribe-cuda-*
            sidecar/dist/sidecar-manifest.json
