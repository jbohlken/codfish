name: Release Sidecar

on:
  push:
    tags:
      - "sidecar-v*"

permissions:
  contents: read

jobs:
  build-cpu-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r sidecar/requirements.txt

      - name: Download LGPL ffmpeg
        run: python sidecar/fetch_ffmpeg.py

      - name: Build CPU sidecar
        run: python sidecar/build.py --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-windows
          path: |
            sidecar/dist/transcribe-cpu-*.zip

  build-cpu-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r sidecar/requirements.txt

      - name: Install ffmpeg via Homebrew
        run: brew install ffmpeg

      - name: Copy ffmpeg for bundling
        run: python sidecar/fetch_ffmpeg.py

      - name: Build CPU sidecar
        run: python sidecar/build.py --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-macos
          path: |
            sidecar/dist/transcribe-cpu-*.zip

  release:
    needs: [build-cpu-windows, build-cpu-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: sidecar/dist/
          merge-multiple: true

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#sidecar-v}" >> "$GITHUB_OUTPUT"

      - name: Generate manifest
        run: python sidecar/make_manifest.py --version ${{ steps.version.outputs.version }} --dir sidecar/dist

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Transcription Engine ${{ steps.version.outputs.version }}"
          body: |
            CPU variants for Windows x64 and macOS arm64.

            To add the CUDA variant, build locally and upload:
            ```
            sidecar\.venv-cuda\Scripts\activate
            python sidecar\build.py --release --cuda
            ```
            Then split if over 2GB, upload the parts, download all assets
            locally, regenerate the manifest, and re-upload it:
            ```
            python sidecar/make_manifest.py --version ${{ steps.version.outputs.version }} --dir sidecar/dist
            gh release upload sidecar-v${{ steps.version.outputs.version }} sidecar/dist/sidecar-manifest.json --clobber
            ```
          draft: true
          files: |
            sidecar/dist/transcribe-cpu-*.zip
            sidecar/dist/sidecar-manifest.json
