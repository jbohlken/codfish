name: Release App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  build-windows:
    runs-on: windows-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Collect Rust dependency licenses
        run: |
          cargo install cargo-about --features cli
          cd src-tauri && cargo about generate -c about.toml -o resources/THIRD_PARTY_LICENSES_RUST.txt about.hbs

      - name: Collect npm dependency licenses
        run: node scripts/collect-npm-licenses.js src-tauri/resources/THIRD_PARTY_LICENSES_NPM.txt

      - name: Build Tauri app (no release upload)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          CODFISH_GH_PAT: ${{ secrets.CODFISH_GH_PAT }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows installer
        uses: azure/trusted-signing-action@v0
        with:
          endpoint: https://cus.codesigning.azure.net
          trusted-signing-account-name: codfish
          certificate-profile-name: codfish-signing
          files-folder: src-tauri/target/release/bundle/nsis/
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload signed artifacts to release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          # Create draft release if it doesn't exist yet
          gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1 || \
            gh release create "$tag" --repo "${{ github.repository }}" --title "Codfish $tag" --draft
          # Upload NSIS installer + updater sig
          for f in src-tauri/target/release/bundle/nsis/*.exe src-tauri/target/release/bundle/nsis/*.sig; do
            [ -f "$f" ] && gh release upload "$tag" "$f" --repo "${{ github.repository }}" --clobber
          done

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Collect Rust dependency licenses
        run: |
          cargo install cargo-about --features cli
          cd src-tauri && cargo about generate -c about.toml -o resources/THIRD_PARTY_LICENSES_RUST.txt about.hbs

      - name: Collect npm dependency licenses
        run: node scripts/collect-npm-licenses.js src-tauri/resources/THIRD_PARTY_LICENSES_NPM.txt

      - name: Build and notarize Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          CODFISH_GH_PAT: ${{ secrets.CODFISH_GH_PAT }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Codfish ${{ github.ref_name }}"
          releaseBody: ""
          releaseDraft: true
          prerelease: false
          # latest.json is assembled in the dedicated assemble-updater job
          # below, after both platform builds finish. tauri-action would
          # otherwise upload a partial manifest with only this runner's
          # platform, which the other job (or the assembler) would overwrite.

  assemble-updater:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download platform signature files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          mkdir sigs
          gh release download "$tag" \
            --repo "${{ github.repository }}" \
            --pattern "*.sig" \
            --dir sigs
          ls -la sigs/

      - name: Build latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          version="${tag#v}"
          repo="${{ github.repository }}"
          pub_date=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")

          # Glob the .sig files rather than hardcoding names so a Tauri
          # filename change (or future per-platform variants) doesn't break
          # the manifest. Exactly one .exe.sig and one .app.tar.gz.sig are
          # expected; fail loudly otherwise.
          win_sig_path=$(ls sigs/*.exe.sig 2>/dev/null | head -1)
          mac_sig_path=$(ls sigs/*.app.tar.gz.sig 2>/dev/null | head -1)
          if [ -z "$win_sig_path" ] || [ -z "$mac_sig_path" ]; then
            echo "Missing platform signature(s) — expected one *.exe.sig and one *.app.tar.gz.sig in release assets."
            exit 1
          fi

          win_asset=$(basename "$win_sig_path" .sig)
          mac_asset=$(basename "$mac_sig_path" .sig)
          win_sig=$(cat "$win_sig_path")
          mac_sig=$(cat "$mac_sig_path")
          base_url="https://github.com/${repo}/releases/download/${tag}"

          jq -n \
            --arg version "$version" \
            --arg pub_date "$pub_date" \
            --arg win_sig "$win_sig" \
            --arg win_url "${base_url}/${win_asset}" \
            --arg mac_sig "$mac_sig" \
            --arg mac_url "${base_url}/${mac_asset}" \
            '{
              version: $version,
              notes: "",
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $mac_sig, url: $mac_url },
                "darwin-aarch64-app": { signature: $mac_sig, url: $mac_url },
                "windows-x86_64": { signature: $win_sig, url: $win_url }
              }
            }' > latest.json
          cat latest.json

      - name: Upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" latest.json \
            --repo "${{ github.repository }}" --clobber
