name: Build CUDA Sidecar (test)

# Standalone workflow for proving the CUDA sidecar can be built reproducibly
# in CI on a runner with no GPU. PyTorch's CUDA wheels include the runtime
# libs (cudart, cublas, cudnn, etc.) so we don't need the NVIDIA toolkit
# installed — we just `pip install -r requirements-cuda.txt` and let
# PyInstaller bundle the wheel's libs.
#
# Once this proves out, the steps will be folded into release-sidecar.yml
# and this workflow can be deleted.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Free up disk space
        shell: pwsh
        run: |
          # The CUDA wheel set + PyInstaller workdir need ~15-20 GB.
          # windows-latest has plenty, but trim some preinstalled bloat
          # in case we're tight.
          Get-PSDrive C | Select-Object Used,Free

      - name: Install CUDA-flavored PyTorch and sidecar deps
        run: |
          python -m pip install --upgrade pip
          pip install -r sidecar/requirements-cuda.txt

      - name: Verify torch is the CUDA build
        shell: pwsh
        run: |
          python -c "import torch; print('torch:', torch.__version__); print('cuda build:', torch.version.cuda)"
          # We can't check torch.cuda.is_available() — there's no GPU here.
          # But torch.version.cuda being set proves we got the cu* wheel.
          python -c "import torch, sys; sys.exit(0 if torch.version.cuda else 1)"

      - name: Download LGPL ffmpeg
        run: python sidecar/fetch_ffmpeg.py

      - name: Build CUDA sidecar
        run: python sidecar/build.py --release --cuda --skip-cuda-check

      - name: Show output size
        shell: pwsh
        run: |
          Get-ChildItem sidecar/dist/transcribe-cuda-* | Format-Table Name, Length

      - name: Split if over 2GB
        shell: pwsh
        run: |
          $threshold = 2000000000
          $partSize  = 1900000000
          $zip = Get-ChildItem sidecar/dist/transcribe-cuda-*.zip | Select-Object -First 1
          if (-not $zip) { throw "No CUDA zip produced" }
          if ($zip.Length -le $threshold) {
            Write-Host "Zip is under 2GB, no splitting needed: $($zip.Length) bytes"
            exit 0
          }
          Write-Host "Splitting $($zip.Name) ($($zip.Length) bytes) into ~1.9 GB parts"
          $stream = [System.IO.File]::OpenRead($zip.FullName)
          try {
            $partNum = 1
            $buffer  = New-Object byte[] $partSize
            while ($true) {
              $read = $stream.Read($buffer, 0, $buffer.Length)
              if ($read -le 0) { break }
              $partPath = "$($zip.FullName).part$partNum"
              $fs = [System.IO.File]::OpenWrite($partPath)
              try { $fs.Write($buffer, 0, $read) } finally { $fs.Close() }
              Write-Host "  wrote $partPath ($read bytes)"
              $partNum++
            }
          } finally {
            $stream.Close()
          }
          Remove-Item $zip.FullName
          Get-ChildItem sidecar/dist/transcribe-cuda-* | Format-Table Name, Length

      - uses: actions/upload-artifact@v4
        with:
          name: sidecar-cuda-windows
          path: sidecar/dist/transcribe-cuda-*
          if-no-files-found: error
